name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Test
        run: make test

      - name: Lint
        run: make lint-ci

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Vulnerability check
        run: govulncheck -tags "fts5 sqlite_vec" ./...

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # sqlite-vec's CGo bindings #include <sqlite3.h>, which isn't on
      # the default windows-latest include path. Install it from MSYS2
      # (already present on the runner) and point CGO_CFLAGS at it.
      #
      # -fgnu89-inline is needed because arrow-go/v18's cdata helpers.h
      # defines helpers as bare `inline` (not `static inline`) — under
      # C99 that needs a single external definition that no TU
      # provides, so MinGW's ld fails on ArrowArrayIsReleased etc.
      # GNU89 inline semantics always emit the external definition.
      - name: Install sqlite3 dev headers
        shell: pwsh
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed mingw-w64-x86_64-sqlite3

      - name: Build
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-IC:/msys64/mingw64/include -fgnu89-inline"
        run: go build -tags "fts5 sqlite_vec" -o msgvault.exe ./cmd/msgvault

      - name: Test
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-IC:/msys64/mingw64/include -fgnu89-inline"
        run: go test -tags "fts5 sqlite_vec" ./...

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msgvault-windows-amd64
          path: msgvault.exe

  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Build
        run: nix build
